


variables:
  DOCKER_IMAGE_SHA_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA # CI_COMMIT_SHA is the commit hash => a1b2c3d4
  DOCKER_IMAGE_BRANCH_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG # CI_COMMIT_REF_SLUG is the branch name
  DOCKER_IMAGE_LATEST_TAG: $CI_REGISTRY_IMAGE:latest
  DEPLOY_OVERLAYS: "dev prod" 



stages:
  - build
  - push
  - deploy

.rules_common:
  rules:
    - changes:
      - Dockerfile
      - Caddyfile
      - src/**/*
      - package.json
      - vite.config.ts
      - postcss.config.js
      - tsconfig.app.json

build_image:
  extends: .rules_common
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $DOCKER_IMAGE_SHA_TAG  -t $DOCKER_IMAGE_BRANCH_TAG .
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - docker push $DOCKER_IMAGE_SHA_TAG
    - docker push $DOCKER_IMAGE_BRANCH_TAG
    - touch image_built.flag
  tags:
    - dind


deploy:
  stage: deploy
  image: docker:29.2.1-alpine3.23
  services:
    - docker:dind
  tags:
    - dind
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "0"
    DEPLOY_OVERLAYS: "dev prod"
  needs:
    - job: build_image
      optional: true

  before_script:
    - apk add --no-cache git curl ca-certificates
    # kustomize
    - curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.7.1/kustomize_v5.7.1_linux_amd64.tar.gz | tar xz
    - mv kustomize /usr/local/bin/
    - kustomize version && git --version
    # git identity
    - git config --global user.email "ci-bot@gitlab.empa.ch"
    - git config --global user.name "CI Bot"
    # work on a real branch, not detached HEAD
    - git fetch origin "$CI_COMMIT_REF_NAME"
    - git checkout -B "$CI_COMMIT_REF_NAME" "origin/$CI_COMMIT_REF_NAME"
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin

  script:
    - |
      set -euo pipefail

      SHA_REF="${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}"
      BRANCH_REF="${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"

      if docker manifest inspect "$SHA_REF" >/dev/null 2>&1; then
        SELECTED_REF="$SHA_REF"
        echo "Using commit image: $SELECTED_REF"
      elif docker manifest inspect "$BRANCH_REF" >/dev/null 2>&1; then
        SELECTED_REF="$BRANCH_REF"
        echo "Commit image missing, falling back to branch image: $SELECTED_REF"
      else
        echo "ERROR: neither $SHA_REF nor $BRANCH_REF exists in the registry" >&2
        exit 1
      fi

      # Get an immutable digest reference: image@sha256:...
      # We pull (lightweight) to populate RepoDigests locally.
      docker pull "$SELECTED_REF" >/dev/null

      PINNED_IMAGE="$(docker inspect --format='{{index .RepoDigests 0}}' "$SELECTED_REF")"
      if [ -z "$PINNED_IMAGE" ]; then
        echo "ERROR: could not resolve RepoDigest for $SELECTED_REF" >&2
        docker inspect "$SELECTED_REF" || true
        exit 1
      fi

      echo "Resolved immutable image reference: $PINNED_IMAGE"

      for env in $DEPLOY_OVERLAYS; do
        echo "→ pinning overlay $env"
        (cd "deploy/overlays/$env" && \
          kustomize edit set image "${CI_REGISTRY_IMAGE}=${PINNED_IMAGE}")
      done

      git add deploy/overlays/*/kustomization.yaml
      git commit -m "Pin ilog to $PINNED_IMAGE [ci skip]" || echo "No changes to commit"
      git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:"$CI_COMMIT_REF_NAME"