apiVersion: apps/v1
kind: Deployment
metadata:
  name: ilog
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ilog
  template:
    metadata:
      labels:
        app: ilog
    spec:
      containers:
        - name: ilog
          image: gitlab-registry.empa.ch/openbis-tools/ilog:master
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          environment:
            - name: OPENBIS_URL
              value: https://openbis-empa-lab205.ethz.ch
      imagePullSecrets:
        - name: ilog-docker-registry
---
apiVersion: v1
kind: Service
metadata:
  name: ilog
  namespace: default
spec:
  selector:
    app: ilog
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ilog
  namespace: default
  annotations:
    spec.ingressClassName: traefik
spec:
  rules:
      - host: ilog.empa.ch
        http:
          paths:
            - backend:
                service:
                  name: ilog
                  port:
                    number: 80
              path: /
              pathType: Prefix
  tls:
      - hosts:
          - ilog.empa.ch
        secretName: default-tls