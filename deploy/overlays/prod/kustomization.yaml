apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ilog
resources:
- ../../base
- ./sealed-secrets.yaml

patches:
- patch: |
    - op: replace
      path: /spec/rules/0/host
      value: ilog.empa.ch
    - op: replace
      path: /spec/tls/0/hosts/0
      value: ilog.empa.ch
  target:
    kind: Ingress
    name: ilog

configMapGenerator:
- behavior: replace
  literals:
  - OPENBIS_URL=https://openbis-empa-lab205.ethz.ch
  - CADDY_LOG_LEVEL=DEBUG
  name: ilog-env

# Prefer the images transformer so CI can "edit set image" here
images:
- digest: sha256:daa8b22b0a9dcdb81c72d7a84dbd4c965ad313143a2a46bb596c9b4982b10f6c
  name: gitlab-registry.empa.ch/openbis-tools/ilog
  newName: gitlab-registry.empa.ch/openbis-tools/ilog
