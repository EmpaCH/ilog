apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ilog
resources:
- ../../base
- ./sealed-secrets.yaml

patches:
- patch: |
    - op: replace
      path: /spec/rules/0/host
      value: ilog.empa.ch
    - op: replace
      path: /spec/tls/0/hosts/0
      value: ilog.empa.ch
  target:
    kind: Ingress
    name: ilog

configMapGenerator:
- behavior: replace
  literals:
  - OPENBIS_URL=https://openbis-empa-lab205.ethz.ch
  - CADDY_LOG_LEVEL=DEBUG
  name: ilog-env

# Prefer the images transformer so CI can "edit set image" here
images:
- digest: sha256:8cb950972f770b91b88858a8678764ed203b43ccffaa649a3d6712e46c9f8854
  name: gitlab-registry.empa.ch/openbis-tools/ilog
  newName: gitlab-registry.empa.ch/openbis-tools/ilog
