apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ilog
resources:
  - ../../base
  - ./sealed-secrets.yaml

patches:
  - target:
      kind: Ingress
      name: ilog
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ilog.empa.ch
      - op: replace
        path: /spec/tls/0/hosts/0
        value: ilog.empa.ch

configMapGenerator:
  - name: ilog-env
    behavior: replace
    literals:
      - OPENBIS_URL=https://openbis-empa-lab205.ethz.ch

# Prefer the images transformer so CI can "edit set image" here
images:
- name: gitlab-registry.empa.ch/openbis-tools/ilog
  newName: gitlab-registry.empa.ch/openbis-tools/ilog
  newTag: pilot-1
