apiVersion: apps/v1
kind: Deployment
metadata:
  name: ilog
spec:
  selector:
    matchLabels:
      app: ilog
  template:
    spec:
      containers:
        - name: ilog
          env:
            - name: OPENBIS_URL
              value: https://openbis-empa-test.ethz.ch
--- 
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ilog
  namespace: default
  annotations:
    spec.ingressClassName: traefik
spec:
  rules:
      - host: test.ilog.empa.ch
        http:
          paths:
            - backend:
                service:
                  name: ilog
                  port:
                    number: 80
              path: /
              pathType: Prefix
  tls:
      - hosts:
          - test.ilog.empa.ch
        secretName: default-tls